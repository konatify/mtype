<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links — mtype</title>
<link rel="icon" type="image/png" href="/images/mtype.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #313338;
    --bg-light: #3a3d42;
    --bg-lighter: #43464c;
    --accent: #e2b714;
    --white: #ffffff;
  }

  body {
    background: var(--bg);
    font-family: 'Roboto Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 56px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    background: rgba(49,51,56,0.95);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-left { display: flex; gap: 0.25rem; }
  .nav-right { display: flex; gap: 0.25rem; }

  nav a {
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    cursor: pointer;
  }

  nav a:hover {
    color: var(--white);
    background: rgba(255,255,255,0.06);
  }

  nav a.active {
    color: var(--accent);
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 4rem;
    gap: 0;
    width: 100%;
  }

  .page-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2.5rem;
    gap: 0.4rem;
  }

  .title-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 0.75rem;
  }

  .title {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.02em;
    line-height: 1;
    display: inline-block;
  }

  .title-underline {
    display: block;
    height: 3px;
    margin-top: 6px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) 40%, transparent 100%);
    border-radius: 2px;
    width: 100%;
  }

  .page-subtitle {
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    text-align: center;
  }

  .links-container {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 3rem 1.5rem;
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    text-align: center;
  }

  .empty-state svg {
    opacity: 0.2;
    width: 40px;
    height: 40px;
  }

  .empty-link {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.15s;
  }

  .empty-link:hover { opacity: 1; }

  .link-card {
    background: var(--bg-light);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s, background 0.15s;
    animation: slideIn 0.18s ease-out both;
  }

  .link-card:hover {
    border-color: rgba(255,255,255,0.13);
    background: var(--bg-lighter);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-icon {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-icon svg {
    width: 15px;
    height: 15px;
    opacity: 0.5;
  }

  .card-icon.invisible-icon svg {
    opacity: 0.8;
  }

  .card-icon.invisible-icon {
    background: rgba(226,183,20,0.07);
    border-color: rgba(226,183,20,0.2);
  }

  .card-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .card-username {
    font-size: 14px;
    font-weight: 500;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-url {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .invisible-badge {
    font-size: 9px;
    background: rgba(226,183,20,0.12);
    border: 1px solid rgba(226,183,20,0.25);
    color: var(--accent);
    border-radius: 3px;
    padding: 1px 4px;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  .card-date {
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    margin-top: 1px;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .action-btn {
    background: var(--bg-lighter);
    border: 1px solid rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.5);
    font-family: 'Roboto Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }

  .action-btn svg {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
  }

  .action-btn:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--white);
    background: rgba(255,255,255,0.08);
  }

  .action-btn.copied {
    border-color: rgba(226,183,20,0.4);
    color: var(--accent);
    background: rgba(226,183,20,0.08);
  }

  .action-btn.delete-btn:hover {
    border-color: rgba(255, 80, 80, 0.35);
    color: rgba(255, 100, 100, 0.9);
    background: rgba(255, 60, 60, 0.07);
  }

  .list-toolbar {
    width: 100%;
    max-width: 520px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .list-count {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
  }

  .list-count span {
    color: rgba(255,255,255,0.55);
    font-weight: 500;
  }

  .clear-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.3);
    font-family: 'Roboto Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .clear-btn:hover {
    border-color: rgba(255,80,80,0.3);
    color: rgba(255,100,100,0.7);
  }

  .storage-note {
    margin-top: 2rem;
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    text-align: center;
    max-width: 360px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="/">Home</a>
    <a href="https://mtgoals.cc" target="_blank">Monkeytype Goals</a>
    <a href="/list" class="active">My Links</a>
  </div>
  <div class="nav-right">
    <a href="https://github.com/kiirod/mtype" target="_blank">GitHub</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="title-wrap">
      <span class="title">my links</span>
      <span class="title-underline"></span>
    </div>
    <p class="page-subtitle">All the link shorteners you've created on this device.</p>
  </div>

  <div class="list-toolbar" id="toolbar" style="display:none">
    <div class="list-count">Showing <span id="linkCount">0</span> link(s)</div>
    <button class="clear-btn" onclick="clearAll()">Clear all</button>
  </div>

  <div class="links-container" id="linksContainer">
  </div>

  <p class="storage-note" id="storageNote" style="display:none">
    Links are saved locally on this device only. Clearing your browser data will remove them.
  </p>
</main>

<script>
  function loadLinks() {
    try {
      return JSON.parse(localStorage.getItem('mtype_links') || '[]');
    } catch(e) { return []; }
  }

  function saveLinks(links) {
    try {
      localStorage.setItem('mtype_links', JSON.stringify(links));
    } catch(e) {}
  }

  function formatDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function getDisplayUrl(link) {
    if (link.invisible) return 'mtype.cc/ (invisible)';
    return link.url || `mtype.cc/${link.username}`;
  }

  function getCopyUrl(link) {
    if (link.invisible) {
      return encodeZWS(link.username);
    }
    return link.url || `mtype.cc/${link.username}`;
  }

  function encodeZWS(str) {
    let result = 'mtype.cc/\u{E0001}';
    for (const ch of str) {
      const code = ch.codePointAt(0);
      result += String.fromCodePoint(0xE0000 + code);
    }
    return result;
  }

  function render() {
    const links = loadLinks();
    const container = document.getElementById('linksContainer');
    const toolbar = document.getElementById('toolbar');
    const storageNote = document.getElementById('storageNote');
    const countEl = document.getElementById('linkCount');

    container.innerHTML = '';

    if (links.length === 0) {
      toolbar.style.display = 'none';
      storageNote.style.display = 'none';
      container.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13.5 3H12H7C5.89543 3 5 3.89543 5 5V19C5 20.1046 5.89543 21 7 21H17C18.1046 21 19 20.1046 19 19V8.5L13.5 3Z" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13 3V9H19" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 13H15" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
            <path d="M9 17H13" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <div>No links yet.<br><a class="empty-link" href="/">Create one →</a></div>
        </div>`;
      return;
    }

    toolbar.style.display = 'flex';
    storageNote.style.display = 'block';
    countEl.textContent = links.length;

    links.forEach((link, i) => {
      const card = document.createElement('div');
      card.className = 'link-card';
      card.style.animationDelay = `${i * 0.04}s`;

      const iconSvg = link.invisible
        ? `<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M2 6C2 2.68629 4.68629 0 8 0C11.3137 0 14 2.68629 14 6V16H12L10 14L8 16L6 14L4 16H2V6ZM7 6C7 6.55228 6.55228 7 6 7C5.44772 7 5 6.55228 5 6C5 5.44772 5.44772 5 6 5C6.55228 5 7 5.44772 7 6ZM10 7C10.5523 7 11 6.55228 11 6C11 5.44772 10.5523 5 10 5C9.44772 5 9 5.44772 9 6C9 6.55228 9.44772 7 10 7Z" fill="#e2b714"/>
           </svg>`
        : `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
           </svg>`;

      const displayUrl = link.invisible
        ? `<span>mtype.cc/</span><span class="invisible-badge">invisible</span>`
        : `<span>${link.url || 'mtype.cc/' + link.username}</span>`;

      card.innerHTML = `
        <div class="card-icon ${link.invisible ? 'invisible-icon' : ''}">
          ${iconSvg}
        </div>
        <div class="card-body">
          <div class="card-username">${escapeHtml(link.username)}</div>
          <div class="card-url">${displayUrl}</div>
          ${link.createdAt ? `<div class="card-date">${formatDate(link.createdAt)}</div>` : ''}
        </div>
        <div class="card-actions">
          <button class="action-btn copy-action" onclick="copyLink(this, ${i})" title="Copy">
            <svg fill="currentColor" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.4,11.6h17.3c0.9,0,1.6-0.7,1.6-1.6V6.8c0-2.6-2.1-4.8-4.7-4.8h-11c-2.6,0-4.7,2.2-4.7,4.8V10 C15.8,10.9,16.5,11.6,17.4,11.6z"/>
              <path d="M43.3,6h-1.6c-0.5,0-0.8,0.3-0.8,0.8V10c0,3.5-2.8,6.4-6.3,6.4H17.4c-3.5,0-6.3-2.9-6.3-6.4V6.8 c0-0.5-0.3-0.8-0.8-0.8H8.7C6.1,6,4,8.2,4,10.8v34.4C4,47.8,6.1,50,8.7,50h34.6c2.6,0,4.7-2.2,4.7-4.8V10.8C48,8.2,45.9,6,43.3,6z"/>
            </svg>
            Copy
          </button>
          <button class="action-btn delete-btn" onclick="deleteLink(${i})" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>`;

      container.appendChild(card);
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function copyLink(btn, index) {
    const links = loadLinks();
    const link = links[index];
    if (!link) return;
    try {
      await navigator.clipboard.writeText(getCopyUrl(link));
      btn.classList.add('copied');
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 12.6111L8.92308 17.5L20 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Copied!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `
          <svg fill="currentColor" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.4,11.6h17.3c0.9,0,1.6-0.7,1.6-1.6V6.8c0-2.6-2.1-4.8-4.7-4.8h-11c-2.6,0-4.7,2.2-4.7,4.8V10 C15.8,10.9,16.5,11.6,17.4,11.6z"/>
            <path d="M43.3,6h-1.6c-0.5,0-0.8,0.3-0.8,0.8V10c0,3.5-2.8,6.4-6.3,6.4H17.4c-3.5,0-6.3-2.9-6.3-6.4V6.8 c0-0.5-0.3-0.8-0.8-0.8H8.7C6.1,6,4,8.2,4,10.8v34.4C4,47.8,6.1,50,8.7,50h34.6c2.6,0,4.7-2.2,4.7-4.8V10.8C48,8.2,45.9,6,43.3,6z"/>
          </svg>
          Copy`;
      }, 1800);
    } catch(e) {}
  }

  function deleteLink(index) {
    const links = loadLinks();
    links.splice(index, 1);
    saveLinks(links);
    render();
  }

  function clearAll() {
    if (confirm('Remove all saved links? This cannot be undone.')) {
      localStorage.removeItem('mtype_links');
      render();
    }
  }

  render();
</script>
</body>
</html>
